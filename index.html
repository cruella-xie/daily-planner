<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>每日计划</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #FAFAFA;
      --bg-secondary: #F5F5F5;
      --bg-card: #FFFFFF;
      --text-primary: #2D2D2D;
      --text-secondary: #8A8A8A;
      --text-muted: #C0C0C0;
      --accent: #7B9E87;
      --accent-light: #E8F0EA;
      --accent-dark: #5D7E67;
      --danger: #E57373;
      --danger-light: #FFEBEE;
      --completed-bg: #E8E8E8;
      --completed-text: #A0A0A0;
      --timeline-track: #E8E8E8;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --shadow-lg: 0 4px 24px rgba(0,0,0,0.1);
      --radius: 16px;
      --radius-sm: 10px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      padding-bottom: 80px;
      overflow-x: hidden;
    }

    /* Header */
    .header {
      padding: 20px 20px 16px;
      position: sticky;
      top: 0;
      background: var(--bg-primary);
      z-index: 100;
    }

    .date-display {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 16px;
      letter-spacing: 0.5px;
    }

    .mode-tabs {
      display: flex;
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 4px;
      gap: 4px;
    }

    .mode-tab {
      flex: 1;
      padding: 10px 16px;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .mode-tab.active {
      background: var(--accent);
      color: white;
      box-shadow: 0 2px 8px rgba(123, 158, 135, 0.3);
    }

    /* Pages */
    .page {
      display: none;
      padding: 0 20px 20px;
      animation: fadeIn 0.3s ease;
    }

    .page.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Task List */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }

    .task-list:empty {
      display: none;
    }

    /* Task Card - Duration Mode */
    .task-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .task-card:active {
      transform: scale(0.98);
    }

    .task-card.running {
      box-shadow: 0 0 0 2px var(--accent), var(--shadow-lg);
    }

    .task-card.completed {
      animation: cardComplete 0.4s ease forwards;
    }

    @keyframes cardComplete {
      to {
        opacity: 0;
        transform: scale(0.9);
        height: 0;
        padding: 0;
        margin: 0;
      }
    }

    .task-info {
      flex: 1;
      min-width: 0;
    }

    .task-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-time-range {
      font-size: 12px;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
    }

    .task-timer {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .timer-display {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 500;
      color: var(--text-primary);
      min-width: 60px;
      text-align: right;
    }

    .timer-display.running {
      color: var(--accent);
    }

    .play-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .play-btn:active {
      transform: scale(0.9);
    }

    .play-btn.running {
      background: var(--accent);
      color: white;
    }

    /* Checkbox */
    .checkbox {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid var(--timeline-track);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
      padding: 0;
    }

    .checkbox.checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .checkbox.checked::after {
      content: '✓';
      color: white;
      font-size: 12px;
      font-weight: 600;
    }

    /* Task Card - Timeline Mode */
    .timeline-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
      overflow: hidden;
      transition: all 0.25s ease;
    }

    .timeline-card.completed {
      background: var(--completed-bg);
    }

    .timeline-card.completed .timeline-name {
      color: var(--completed-text);
    }

    .timeline-card.completed .timeline-time {
      color: var(--completed-text);
    }

    .timeline-name {
      font-size: 14px;
      font-weight: 500;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .timeline-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* Swipe Delete */
    .swipe-container {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
    }

    .swipe-content {
      position: relative;
      z-index: 1;
      background: var(--bg-card);
      transition: transform 0.25s ease;
    }

    .swipe-container.swiped .swipe-content {
      transform: translateX(-80px);
    }

    .delete-bg {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 80px;
      background: var(--danger);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      font-weight: 600;
      border-radius: 0 var(--radius) var(--radius) 0;
      z-index: 0;
    }

    /* Add Task Button */
    .add-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 16px;
      background: transparent;
      border: 1.5px dashed var(--timeline-track);
      border-radius: var(--radius);
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s ease;
    }

    .add-btn:active {
      background: var(--bg-secondary);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Clear All Button */
    .clear-all-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 16px;
      background: var(--danger-light);
      border: none;
      border-radius: var(--radius);
      color: var(--danger);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      margin-top: 12px;
      transition: all 0.2s ease;
    }

    .clear-all-btn:active {
      transform: scale(0.98);
      background: var(--danger);
      color: white;
    }

    /* Add Task Form */
    .add-form {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow-lg);
      margin-bottom: 16px;
      display: none;
      animation: slideUp 0.3s ease;
    }

    .add-form.active {
      display: block;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-row {
      margin-bottom: 14px;
    }

    .form-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 6px;
      display: block;
    }

    .form-input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--timeline-track);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 14px;
      color: var(--text-primary);
      background: var(--bg-primary);
      transition: border-color 0.2s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .time-inputs {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 8px;
      align-items: center;
    }

    .time-separator {
      color: var(--text-muted);
      font-size: 14px;
    }

    .form-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-cancel {
      background: var(--bg-secondary);
      color: var(--text-secondary);
    }

    .btn-confirm {
      background: var(--accent);
      color: white;
    }

    .btn-confirm:disabled {
      background: var(--timeline-track);
      color: var(--text-muted);
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: var(--bg-card);
      display: flex;
      box-shadow: 0 -2px 20px rgba(0,0,0,0.06);
      z-index: 1000;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      transition: color 0.2s ease;
    }

    .nav-item.active {
      color: var(--accent);
    }

    .nav-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Home icon - simple house shape */
    .nav-icon-home::before {
      content: '';
      width: 0;
      height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-bottom: 8px solid currentColor;
      position: absolute;
      top: 4px;
    }

    .nav-icon-home::after {
      content: '';
      width: 14px;
      height: 10px;
      background: currentColor;
      position: absolute;
      bottom: 4px;
    }

    /* Must icon - checkmark */
    .nav-icon-must::before {
      content: '';
      width: 12px;
      height: 6px;
      border-left: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      transform: rotate(-45deg);
      position: absolute;
      top: 10px;
    }

    /* Schedule icon - calendar */
    .nav-icon-schedule::before {
      content: '';
      width: 16px;
      height: 14px;
      border: 2px solid currentColor;
      border-radius: 2px;
      position: absolute;
      top: 5px;
    }

    .nav-icon-schedule::after {
      content: '';
      width: 10px;
      height: 2px;
      background: currentColor;
      position: absolute;
      top: 8px;
    }

    /* Must To Be Page */
    .must-page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 20px;
      padding-top: 4px;
    }

    .must-reset-btn {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      background: var(--bg-secondary);
      border: none;
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .must-reset-btn:hover {
      background: var(--accent-light);
      color: var(--accent);
    }

    .must-reset-btn:active {
      transform: scale(0.95);
    }

    .must-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 4px;
    }

    .must-btn {
      aspect-ratio: 1;
      border: none;
      border-radius: var(--radius);
      background: var(--bg-card);
      box-shadow: var(--shadow);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 12px;
      line-height: 1.3;
      transition: all 0.2s ease;
      position: relative;
    }

    .must-btn:active {
      transform: scale(0.95);
    }

    .must-btn.completed {
      background: var(--completed-bg);
      color: var(--completed-text);
    }

    .must-btn.add-must {
      background: var(--accent-light);
      color: var(--accent);
      font-size: 24px;
      font-weight: 300;
    }

    /* Must Add Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 2000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .modal-overlay.show {
      opacity: 1;
      visibility: visible;
    }

    .modal-sheet {
      background: var(--bg-card);
      border-radius: 24px 24px 0 0;
      padding: 24px;
      width: 100%;
      max-width: 500px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .modal-overlay.show .modal-sheet {
      transform: translateY(0);
    }

    .modal-handle {
      width: 36px;
      height: 4px;
      background: var(--timeline-track);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 20px;
      text-align: center;
    }

    .modal-input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid var(--timeline-track);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 15px;
      color: var(--text-primary);
      background: var(--bg-primary);
      margin-bottom: 16px;
      transition: border-color 0.2s ease;
    }

    .modal-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .modal-input::placeholder {
      color: var(--text-muted);
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .modal-btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .modal-btn-cancel {
      background: var(--bg-secondary);
      color: var(--text-secondary);
    }

    .modal-btn-confirm {
      background: var(--accent);
      color: white;
    }

    /* Schedule Page */
    .schedule-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .schedule-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .month-nav {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .month-nav-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: var(--bg-card);
      box-shadow: var(--shadow);
      color: var(--text-secondary);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .month-nav-btn:active {
      transform: scale(0.9);
    }

    .current-month {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
      min-width: 80px;
      text-align: center;
    }

    /* Calendar */
    .calendar {
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 16px;
    }

    .calendar-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: var(--bg-secondary);
      padding: 8px 0;
    }

    .weekday {
      text-align: center;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      padding: 6px;
      gap: 4px;
    }

    .calendar-cell {
      display: flex;
      flex-direction: column;
      min-height: 32px;
    }

    .calendar-cell.empty {
      min-height: 24px;
    }

    .calendar-day {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.2s ease;
      flex-shrink: 0;
      margin: 4px auto;
    }

    .calendar-cell.empty .calendar-day {
      margin: 0 auto;
    }

    .calendar-day:hover {
      background: var(--bg-secondary);
    }

    .calendar-day.other-month {
      color: var(--text-muted);
    }

    .calendar-day.today {
      background: var(--accent);
      color: white;
    }

    .cell-schedules {
      display: flex;
      flex-direction: column;
      gap: 3px;
      overflow: visible;
    }

    .cell-schedule {
      background: var(--accent-light);
      border-radius: 4px;
      padding: 4px 6px;
      font-size: 11px;
      color: var(--accent-dark);
      display: flex;
      flex-direction: column;
      gap: 2px;
      cursor: pointer;
      transition: all 0.15s ease;
      position: relative;
    }

    .cell-schedule:hover {
      background: var(--accent);
      color: white;
    }

    .cell-schedule:hover .cell-schedule-delete {
      opacity: 1;
    }

    .cell-schedule-title {
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cell-schedule-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      font-size: 10px;
      opacity: 0.8;
    }

    .cell-schedule-time {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .cell-schedule-location {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .cell-schedule-delete {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.5);
      color: inherit;
      font-size: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .cell-schedule-delete:hover {
      background: var(--danger);
      color: white;
    }

    .cell-schedule-notes {
      font-size: 10px;
      opacity: 0.7;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    /* Add Schedule Button */
    .add-schedule-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: white;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      margin-top: 16px;
      transition: all 0.2s ease;
    }

    .add-schedule-btn:active {
      transform: scale(0.98);
      background: var(--accent-dark);
    }

    /* Schedule Form Modal */
    .schedule-form {
      padding: 8px 0;
    }

    .form-row-group {
      margin-bottom: 14px;
    }

    /* Eye Break Reminder */
    .eye-break {
      position: fixed;
      bottom: 80px;
      left: 20px;
      right: 20px;
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      gap: 16px;
      transform: translateY(120%);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 999;
    }

    .eye-break.show {
      transform: translateY(0);
      opacity: 1;
    }

    .eye-icon {
      width: 56px;
      height: 56px;
      background: var(--accent-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      animation: eyeMove 2s ease-in-out infinite;
    }

    @keyframes eyeMove {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    .eye-text {
      flex: 1;
    }

    .eye-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .eye-desc {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .eye-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--bg-secondary);
      color: var(--text-secondary);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .eye-countdown {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--accent);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    .empty-text {
      font-size: 14px;
    }

    /* Confirm Dialog */
    .confirm-dialog {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 24px;
      width: calc(100% - 60px);
      max-width: 320px;
      box-shadow: var(--shadow-lg);
      z-index: 3000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s ease;
    }

    .confirm-dialog.show {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, -50%) scale(1);
    }

    .confirm-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
      text-align: center;
    }

    .confirm-message {
      font-size: 14px;
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .confirm-actions {
      display: flex;
      gap: 12px;
    }

    .confirm-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .confirm-btn-cancel {
      background: var(--bg-secondary);
      color: var(--text-secondary);
    }

    .confirm-btn-danger {
      background: var(--danger);
      color: white;
    }

    .dialog-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.4);
      z-index: 2999;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s ease;
    }

    .dialog-overlay.show {
      opacity: 1;
      visibility: visible;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header" id="mainHeader">
    <div class="date-display" id="dateDisplay"></div>
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="duration">时长模式</button>
      <button class="mode-tab" data-mode="timeline">时间轴模式</button>
    </div>

  <!-- Home Page -->
  <main class="page active" id="homePage">
    <div class="task-list" id="taskList"></div>
    <button class="add-btn" id="addBtn">
      <span>+</span>
      <span>添加新计划</span>
    </button>
    <button class="clear-all-btn" id="clearAllBtn">清空所有任务</button>
  </main>

  <!-- Add Task Form -->
  <div class="add-form" id="addForm">
    <div class="form-row">
      <label class="form-label">任务名称</label>

    </div>
    <div class="form-row">
      <label class="form-label">时间段</label>
      <div class="time-inputs">
        <input type="time" class="form-input" id="startTime">

      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-cancel" id="cancelBtn">取消</button>

    </div>
  </div>

  <!-- Must To Be Page -->
  <main class="page" id="mustPage">
    <div class="must-page-header">
      <span>Must To Be</span>
      <button class="must-reset-btn" id="mustResetBtn">重置</button>
    </div>
    <div class="must-grid" id="mustGrid"></div>
  </main>

  <!-- Schedule Page -->
  <main class="page" id="schedulePage">
    <div class="schedule-header">
      <div class="schedule-title">日程安排</div>
      <div class="month-nav">
        <button class="month-nav-btn" id="prevMonth">&lt;</button>
        <span class="current-month" id="currentMonth"></span>
        <button class="month-nav-btn" id="nextMonth">&gt;</button>
      </div>
    </div>
    <div class="calendar">
      <div class="calendar-weekdays">
        <div class="weekday">日</div>
        <div class="weekday">一</div>
        <div class="weekday">二</div>
        <div class="weekday">三</div>
        <div class="weekday">四</div>
        <div class="weekday">五</div>
        <div class="weekday">六</div>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>
    <button class="add-schedule-btn" id="addScheduleBtn">+ 添加日程</button>
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-page="home">
      <span class="nav-icon nav-icon-home"></span>
      <span>首页</span>
    </button>
    <button class="nav-item" data-page="must">
      <span class="nav-icon nav-icon-must"></span>
      <span>Must</span>
    </button>
    <button class="nav-item" data-page="schedule">
      <span class="nav-icon nav-icon-schedule"></span>
      <span>日程</span>
    </button>
  </nav>

  <!-- Eye Break Reminder -->
  <div class="eye-break" id="eyeBreak">
    <div class="eye-icon">&#128064;</div>
    <div class="eye-text">
      <div class="eye-title">远眺休息</div>
      <div class="eye-desc">保护眼睛，眺望远处 20 秒</div>
    </div>
    <div class="eye-countdown" id="eyeCountdown">3s</div>
    <button class="eye-close" id="eyeClose">&#215;</button>
  </div>

  <!-- Must Add Modal -->
  <div class="modal-overlay" id="mustModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">添加每日习惯</div>
      <input type="text" class="modal-input" id="mustNameInput" placeholder="输入习惯名称" maxlength="20">
      <div class="modal-actions">
        <button class="modal-btn modal-btn-cancel" id="mustModalCancel">取消</button>
        <button class="modal-btn modal-btn-confirm" id="mustModalConfirm">确认</button>
      </div>
    </div>
  </div>

  <!-- Schedule Add/Edit Modal -->
  <div class="modal-overlay" id="scheduleModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title" id="scheduleModalTitle">添加日程</div>
      <div class="schedule-form">
        <div class="form-row-group">
          <input type="text" class="modal-input" id="scheduleTitle" placeholder="日程标题" maxlength="50">
        </div>
        <div class="form-row-group">
          <input type="date" class="modal-input" id="scheduleDate">
        </div>
        <div class="form-row-group">
          <input type="time" class="modal-input" id="scheduleTime" placeholder="时间">
        </div>
        <div class="form-row-group">
          <input type="text" class="modal-input" id="scheduleLocation" placeholder="地点（选填）" maxlength="100">
        </div>
        <div class="form-row-group">
          <textarea class="modal-input" id="scheduleNotes" placeholder="备注（选填）" rows="3" style="resize: none;"></textarea>
        </div>
        <div class="modal-actions">
          <button class="modal-btn modal-btn-cancel" id="scheduleModalCancel">取消</button>
          <button class="modal-btn modal-btn-confirm" id="scheduleModalConfirm">确认</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Confirm Dialog -->
  <div class="dialog-overlay" id="dialogOverlay"></div>
  <div class="confirm-dialog" id="confirmDialog">
    <div class="confirm-title" id="confirmTitle">确认操作</div>
    <div class="confirm-message" id="confirmMessage">确定要执行此操作吗？</div>
    <div class="confirm-actions">
      <button class="confirm-btn confirm-btn-cancel" id="confirmCancel">取消</button>
      <button class="confirm-btn confirm-btn-danger" id="confirmOk">确定</button>
    </div>
  </div>

  <script>
    // ===== State =====
    const state = {
      mode: 'duration',
      currentPage: 'home',
      tasks: [],
      mustTasks: [],
      schedules: [],
      currentScheduleDate: null,
      currentMonth: new Date(),
      eyeBreakEnabled: true,
      eyeBreakTimer: null,
      eyeBreakInterval: 30 * 60 * 1000,
      taskIntervals: {}
    };

    // ===== Storage =====
    const STORAGE_KEYS = {
      tasks: 'dailyPlanner_tasks',
      mustTasks: 'dailyPlanner_mustTasks',
      schedules: 'dailyPlanner_schedules',
      settings: 'dailyPlanner_settings',
      lastDate: 'dailyPlanner_lastDate'
    };

    function saveToStorage(key, data) {
      localStorage.setItem(key, JSON.stringify(data));
    }

    function loadFromStorage(key) {
      const data = localStorage.getItem(key);
      return data ? JSON.parse(data) : null;
    }

    function checkDate() {
      const today = new Date().toDateString();
      const lastDate = loadFromStorage(STORAGE_KEYS.lastDate);
      if (lastDate !== today) {
        state.tasks = [];
        saveToStorage(STORAGE_KEYS.tasks, []);
        // Reset must tasks completed status for new day
        state.mustTasks.forEach(t => t.completed = false);
        saveToStorage(STORAGE_KEYS.mustTasks, state.mustTasks);
        saveToStorage(STORAGE_KEYS.lastDate, today);
      }
    }

    function loadAllData() {
      checkDate();
      const tasks = loadFromStorage(STORAGE_KEYS.tasks);
      const mustTasks = loadFromStorage(STORAGE_KEYS.mustTasks);
      const schedules = loadFromStorage(STORAGE_KEYS.schedule);
      const settings = loadFromStorage(STORAGE_KEYS.settings);

      if (tasks) state.tasks = tasks;
      if (mustTasks) state.mustTasks = mustTasks;
      if (schedules) state.schedules = schedules;
      if (settings) state.eyeBreakEnabled = settings.eyeBreakEnabled ?? true;
    }

    function saveTasks() {
      saveToStorage(STORAGE_KEYS.tasks, state.tasks);
    }

    function saveMustTasks() {
      saveToStorage(STORAGE_KEYS.mustTasks, state.mustTasks);
    }

    function saveSchedules() {
      saveToStorage(STORAGE_KEYS.schedule, state.schedules);
    }

    function saveSettings() {
      saveToStorage(STORAGE_KEYS.settings, {
        eyeBreakEnabled: state.eyeBreakEnabled
      });
    }

    // ===== DOM Elements =====
    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => document.querySelectorAll(sel);

    const dateDisplay = $('#dateDisplay');
    const mainHeader = $('#mainHeader');
    const modeTabs = $$('.mode-tab');
    const pages = $$('.page');
    const navItems = $$('.nav-item');
    const taskList = $('#taskList');
    const addBtn = $('#addBtn');
    const clearAllBtn = $('#clearAllBtn');
    const addForm = $('#addForm');
    const taskNameInput = $('#taskName');
    const startTimeInput = $('#startTime');
    const endTimeInput = $('#endTime');
    const cancelBtn = $('#cancelBtn');
    const confirmBtn = $('#confirmBtn');
    const mustGrid = $('#mustGrid');
    const mustModal = $('#mustModal');
    const mustNameInput = $('#mustNameInput');
    const mustModalCancel = $('#mustModalCancel');
    const mustModalConfirm = $('#mustModalConfirm');
    const eyeBreakToggle = $('#eyeBreakToggle');
    const eyeBreakEl = $('#eyeBreak');
    const eyeCountdown = $('#eyeCountdown');
    const eyeClose = $('#eyeClose');

    // Schedule elements
    const calendarGrid = $('#calendarGrid');
    const currentMonthEl = $('#currentMonth');
    const prevMonthBtn = $('#prevMonth');
    const nextMonthBtn = $('#nextMonth');
    const addScheduleBtn = $('#addScheduleBtn');
    const scheduleModal = $('#scheduleModal');
    const scheduleModalTitle = $('#scheduleModalTitle');
    const scheduleTitleInput = $('#scheduleTitle');
    const scheduleDateInput = $('#scheduleDate');
    const scheduleTimeInput = $('#scheduleTime');
    const scheduleLocationInput = $('#scheduleLocation');
    const scheduleNotesInput = $('#scheduleNotes');
    const scheduleModalCancel = $('#scheduleModalCancel');
    const scheduleModalConfirm = $('#scheduleModalConfirm');

    // Dialog elements
    const dialogOverlay = $('#dialogOverlay');
    const confirmDialog = $('#confirmDialog');
    const confirmTitle = $('#confirmTitle');
    const confirmMessage = $('#confirmMessage');
    const confirmCancel = $('#confirmCancel');
    const confirmOk = $('#confirmOk');

    // ===== Utilities =====
    function formatTime(minutes) {
      const h = Math.floor(minutes / 60);
      const m = minutes % 60;
      return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
    }

    function formatCountdown(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function parseTime(timeStr) {
      const [h, m] = timeStr.split(':').map(Number);
      return h * 60 + m;
    }

    function calculateDuration(start, end) {
      return parseTime(end) - parseTime(start);
    }

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatDate(date) {
      const y = date.getFullYear();
      const m = (date.getMonth() + 1).toString().padStart(2, '0');
      const d = date.getDate().toString().padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function parseDate(str) {
      const [y, m, d] = str.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    // ===== Date Display =====
    function updateDateDisplay() {
      const now = new Date();
      const options = { month: 'long', day: 'numeric', weekday: 'long' };
      dateDisplay.textContent = now.toLocaleDateString('zh-CN', options);
    }

    // ===== Mode Switching =====
    function setMode(mode) {
      state.mode = mode;
      modeTabs.forEach(tab => {
        tab.classList.toggle('active', tab.dataset.mode === mode);
      });
      renderTasks();
    }

    // ===== Navigation =====
    function setPage(page) {
      state.currentPage = page;
      pages.forEach(p => {
        p.classList.toggle('active', p.id === `${page}Page`);
      });
      navItems.forEach(item => {
        item.classList.toggle('active', item.dataset.page === page);
      });

      // Show/hide header based on page
      mainHeader.style.display = page === 'home' ? 'block' : 'none';

      if (page === 'home' && state.mode === 'duration') {
        startEyeBreakTimer();
      } else {
        stopEyeBreakTimer();
      }

      if (page === 'schedule') {
        renderCalendar();
      }
    }

    // ===== Task Rendering =====
    function renderTasks() {
      let sortedTasks = [...state.tasks].sort((a, b) => {
        return parseTime(a.startTime) - parseTime(b.startTime);
      });

      // In duration mode, hide completed tasks (they show in timeline as gray)
      if (state.mode === 'duration') {
        sortedTasks = sortedTasks.filter(t => !t.completed);
      }

      if (sortedTasks.length === 0) {
        taskList.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">&#128203;</div>
            <div class="empty-text">暂无计划，添加一个开始吧</div>
          </div>
        `;
        return;
      }

      taskList.innerHTML = sortedTasks.map(task => {
        if (state.mode === 'duration') {
          return renderDurationCard(task);
        } else {
          return renderTimelineCard(task);
        }
      }).join('');

      attachSwipeHandlers();
      attachTaskEventListeners();
    }

    function renderDurationCard(task) {
      const isRunning = task.status === 'running';
      const remaining = task.remaining > 0 ? task.remaining : task.duration * 60;
      const icon = isRunning ? '&#9208;' : '&#9654;';

      return `
        <div class="swipe-container" data-id="${task.id}">
          <div class="swipe-content">
            <div class="task-card ${isRunning ? 'running' : ''}" data-id="${task.id}">
              <div class="task-info">
                <div class="task-name">${escapeHtml(task.name)}</div>
                <div class="task-time-range">${task.startTime} - ${task.endTime}</div>
              </div>
              <div class="task-timer">
                <span class="timer-display ${isRunning ? 'running' : ''}">${formatCountdown(remaining)}</span>
                <button class="play-btn ${isRunning ? 'running' : ''}" data-id="${task.id}">${icon}</button>
              </div>
            </div>
          </div>
          <div class="delete-bg">&#128465;</div>
        </div>
      `;
    }

    function renderTimelineCard(task) {
      const isCompleted = task.completed;

      return `
        <div class="swipe-container" data-id="${task.id}">
          <div class="swipe-content">
            <div class="timeline-card ${isCompleted ? 'completed' : ''}" data-id="${task.id}">
              <button class="checkbox ${isCompleted ? 'checked' : ''}" data-id="${task.id}"></button>
              <div class="timeline-name">${escapeHtml(task.name)}</div>
              <div class="timeline-time">${task.startTime} - ${task.endTime}</div>
            </div>
          </div>
          <div class="delete-bg">&#128465;</div>
        </div>
      `;
    }

    // ===== Task Events =====
    function attachTaskEventListeners() {
      // Duration mode - play/pause
      $$('.play-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleTimer(btn.dataset.id);
        });
      });

      // Timeline mode - checkbox
      $$('.checkbox').forEach(cb => {
        cb.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleComplete(cb.dataset.id);
        });
      });
    }

    function attachSwipeHandlers() {
      $$('.swipe-container').forEach(container => {
        let startX = 0;
        let currentX = 0;
        let isSwiped = false;
        const content = container.querySelector('.swipe-content');

        container.addEventListener('touchstart', (e) => {
          // Don't start swipe if touch started on a button or checkbox
          if (e.target.closest('button')) return;
          startX = e.touches[0].clientX;
          currentX = 0;
          isSwiped = false;
          content.style.transition = 'none';
        }, { passive: true });

        container.addEventListener('touchmove', (e) => {
          if (startX === 0) return;
          currentX = e.touches[0].clientX - startX;
          // Only allow left swipe
          if (currentX < -10) {
            e.preventDefault();
            currentX = Math.max(currentX, -90);
            content.style.transform = `translateX(${currentX}px)`;
          }
        }, { passive: false });

        container.addEventListener('touchend', () => {
          if (startX === 0) return;
          startX = 0;
          content.style.transition = 'transform 0.25s ease';
          if (currentX < -60) {
            container.classList.add('swiped');
            content.style.transform = 'translateX(-80px)';
            isSwiped = true;
          } else {
            container.classList.remove('swiped');
            content.style.transform = '';
          }
        });

        container.querySelector('.delete-bg').addEventListener('click', (e) => {
          e.stopPropagation();
          if (isSwiped) {
            deleteTask(container.dataset.id);
          }
        });
      });
    }

    // ===== Timer Functions =====
    function toggleTimer(taskId) {
      const task = state.tasks.find(t => t.id === taskId);
      if (!task) return;

      if (task.status === 'running') {
        pauseTimer(taskId);
      } else {
        startTimer(taskId);
      }
    }

    function startTimer(taskId) {
      const task = state.tasks.find(t => t.id === taskId);
      if (!task) return;

      task.status = 'running';
      saveTasks();

      if (state.taskIntervals[taskId]) {
        clearInterval(state.taskIntervals[taskId]);
      }

      state.taskIntervals[taskId] = setInterval(() => {
        task.remaining--;

        if (task.remaining <= 0) {
          completeTask(taskId);
        } else {
          saveTasks();
          updateTimerDisplay(taskId);
        }
      }, 1000);

      renderTasks();
    }

    function pauseTimer(taskId) {
      const task = state.tasks.find(t => t.id === taskId);
      if (!task) return;

      task.status = 'paused';
      saveTasks();

      if (state.taskIntervals[taskId]) {
        clearInterval(state.taskIntervals[taskId]);
        delete state.taskIntervals[taskId];
      }

      renderTasks();
    }

    function completeTask(taskId) {
      if (state.taskIntervals[taskId]) {
        clearInterval(state.taskIntervals[taskId]);
        delete state.taskIntervals[taskId];
      }

      const task = state.tasks.find(t => t.id === taskId);
      if (task) {
        task.completed = true;
        task.status = 'completed';
        saveTasks();
      }

      // Animate and remove only from duration mode view, keep in timeline mode
      const card = $(`.task-card[data-id="${taskId}"]`);
      if (card) {
        card.classList.add('completed');
        setTimeout(() => {
          // Don't remove from state.tasks, just hide the duration card
          // Timeline mode will show it as completed (grayed out)
          renderTasks();
        }, 400);
      } else {
        renderTasks();
      }
    }

    function updateTimerDisplay(taskId) {
      const task = state.tasks.find(t => t.id === taskId);
      if (!task) return;

      const card = $(`.task-card[data-id="${taskId}"]`);
      if (card) {
        const display = card.querySelector('.timer-display');
        if (display) {
          display.textContent = formatCountdown(task.remaining);
        }
      }
    }

    function toggleComplete(taskId) {
      const task = state.tasks.find(t => t.id === taskId);
      if (!task) return;

      task.completed = !task.completed;
      saveTasks();
      renderTasks();
    }

    function deleteTask(taskId) {
      if (state.taskIntervals[taskId]) {
        clearInterval(state.taskIntervals[taskId]);
        delete state.taskIntervals[taskId];
      }
      state.tasks = state.tasks.filter(t => t.id !== taskId);
      saveTasks();
      renderTasks();
    }

    function clearAllTasks() {
      showConfirm('清空所有任务', '确定要清空首页所有任务吗？此操作不可恢复。', () => {
        // Clear all running intervals
        Object.keys(state.taskIntervals).forEach(id => {
          clearInterval(state.taskIntervals[id]);
        });
        state.taskIntervals = {};
        state.tasks = [];
        saveTasks();
        renderTasks();
      });
    }

    // ===== Add Task =====
    function showAddForm() {
      addForm.classList.add('active');
      addBtn.style.display = 'none';
      clearAllBtn.style.display = 'none';
      taskNameInput.focus();
      setDefaultTimes();
    }

    function hideAddForm() {
      addForm.classList.remove('active');
      addBtn.style.display = 'flex';
      clearAllBtn.style.display = 'flex';
      taskNameInput.value = '';
      startTimeInput.value = '';
      endTimeInput.value = '';
      confirmBtn.disabled = true;
    }

    function setDefaultTimes() {
      const now = new Date();
      const currentMinutes = now.getHours() * 60 + now.getMinutes();
      const roundedMinutes = Math.ceil(currentMinutes / 5) * 5;
      const startStr = formatTime(roundedMinutes);
      const endStr = formatTime(roundedMinutes + 30);

      startTimeInput.value = startStr;
      endTimeInput.value = endStr;
      validateForm();
    }

    function validateForm() {
      const name = taskNameInput.value.trim();
      const start = startTimeInput.value;
      const end = endTimeInput.value;

      const isValid = name && start && end && parseTime(end) > parseTime(start);
      confirmBtn.disabled = !isValid;
    }

    function addTask() {
      const name = taskNameInput.value.trim();
      const startTime = startTimeInput.value;
      const endTime = endTimeInput.value;

      if (!name || !startTime || !endTime) return;

      const duration = calculateDuration(startTime, endTime);
      if (duration <= 0) return;

      const task = {
        id: generateId(),
        name,
        startTime,
        endTime,
        duration,
        remaining: duration * 60,
        status: 'idle',
        completed: false,
        createdAt: Date.now()
      };

      state.tasks.push(task);
      saveTasks();
      hideAddForm();
      renderTasks();
    }

    // ===== Must Tasks =====
    function renderMustTasks() {
      const defaultMust = [
        { id: 'water', name: '喝水', completed: false },
        { id: 'eye', name: '眼保健', completed: false },
        { id: 'stretch', name: '伸懒腰', completed: false },
        { id: 'meditate', name: '冥想', completed: false },
        { id: 'read', name: '读书', completed: false }
      ];

      const allTasks = [...state.mustTasks];
      defaultMust.forEach(d => {
        if (!allTasks.find(t => t.id === d.id)) {
          allTasks.push({ ...d });
        }
      });

      state.mustTasks = allTasks;

      mustGrid.innerHTML = allTasks.map(task => `
        <button class="must-btn ${task.completed ? 'completed' : ''}" data-id="${task.id}">
          ${escapeHtml(task.name)}
        </button>
      `).join('') + `
        <button class="must-btn add-must" id="addMustBtn">+</button>
      `;

      attachMustTaskListeners();
    }

    function attachMustTaskListeners() {
      $$('.must-btn:not(.add-must)').forEach(btn => {
        btn.addEventListener('click', () => {
          toggleMustTask(btn.dataset.id);
        });

        // Long press to delete (except defaults)
        let pressTimer;
        btn.addEventListener('touchstart', () => {
          pressTimer = setTimeout(() => {
            const defaultIds = ['water', 'eye', 'stretch', 'meditate', 'read'];
            if (!defaultIds.includes(btn.dataset.id)) {
              state.mustTasks = state.mustTasks.filter(t => t.id !== btn.dataset.id);
              saveMustTasks();
              renderMustTasks();
            }
          }, 800);
        });

        btn.addEventListener('touchend', () => {
          clearTimeout(pressTimer);
        });

        btn.addEventListener('touchmove', () => {
          clearTimeout(pressTimer);
        });
      });

      $('#addMustBtn').addEventListener('click', showMustModal);
      $('#mustResetBtn').addEventListener('click', resetMustTasks);
    }

    function toggleMustTask(id) {
      const task = state.mustTasks.find(t => t.id === id);
      if (!task) return;

      task.completed = !task.completed;
      saveMustTasks();
      renderMustTasks();
    }

    function resetMustTasks() {
      state.mustTasks.forEach(t => {
        t.completed = false;
      });
      saveMustTasks();
      renderMustTasks();
    }

    function showMustModal() {
      mustModal.classList.add('show');
      mustNameInput.value = '';
      mustNameInput.focus();
    }

    function hideMustModal() {
      mustModal.classList.remove('show');
    }

    function addMustTask() {
      const name = mustNameInput.value.trim();
      if (!name) return;

      state.mustTasks.push({
        id: generateId(),
        name,
        completed: false
      });

      saveMustTasks();
      hideMustModal();
      renderMustTasks();
    }

    // ===== Calendar / Schedule =====
    function renderCalendar() {
      const year = state.currentMonth.getFullYear();
      const month = state.currentMonth.getMonth();

      currentMonthEl.textContent = `${year}年 ${month + 1}月`;

      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const startDay = firstDay.getDay();
      const daysInMonth = lastDay.getDate();

      const today = new Date();
      const todayStr = formatDate(today);

      let html = '';

      // Previous month days
      const prevMonth = new Date(year, month, 0);
      const prevDays = prevMonth.getDate();
      for (let i = startDay - 1; i >= 0; i--) {
        const day = prevDays - i;
        html += `<div class="calendar-cell empty"><div class="calendar-day other-month">${day}</div></div>`;
      }

      // Current month days
      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const isToday = dateStr === todayStr;
        const daySchedules = state.schedules.filter(s => s.date === dateStr);
        const isEmpty = daySchedules.length === 0;

        let dayClasses = 'calendar-day';
        if (isToday) dayClasses += ' today';

        let schedulesHtml = '';
        if (!isEmpty) {
          schedulesHtml = daySchedules.map(s => `
            <div class="cell-schedule" data-id="${s.id}">
              <span class="cell-schedule-title">${escapeHtml(s.title)}</span>
              <div class="cell-schedule-meta">
                ${s.time ? `<span class="cell-schedule-time">&#128337; ${s.time}</span>` : ''}
                ${s.location ? `<span class="cell-schedule-location">&#128205; ${escapeHtml(s.location)}</span>` : ''}
              </div>
              ${s.notes ? `<div class="cell-schedule-notes">${escapeHtml(s.notes)}</div>` : ''}
              <button class="cell-schedule-delete" data-id="${s.id}">&#215;</button>
            </div>
          `).join('');
        }

        html += `<div class="calendar-cell ${isEmpty ? 'empty' : ''}" data-date="${dateStr}">
          <div class="${dayClasses}" data-date="${dateStr}">${day}</div>
          <div class="cell-schedules">${schedulesHtml}</div>
        </div>`;
      }

      // Next month days
      const totalCells = Math.ceil((startDay + daysInMonth) / 7) * 7;
      const remaining = totalCells - (startDay + daysInMonth);
      for (let i = 1; i <= remaining; i++) {
        html += `<div class="calendar-cell empty"><div class="calendar-day other-month">${i}</div></div>`;
      }

      calendarGrid.innerHTML = html;

      attachCalendarListeners();
    }

    function attachCalendarListeners() {
      // Schedule delete buttons
      $$('.cell-schedule-delete').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          deleteSchedule(btn.dataset.id);
        });
      });

      // Schedule item click to edit (optional)
      $$('.cell-schedule').forEach(item => {
        item.addEventListener('click', (e) => {
          if (e.target.classList.contains('cell-schedule-delete')) return;
          // Could open edit modal here
        });
      });
    }
    function prevMonth() {
      state.currentMonth = new Date(state.currentMonth.getFullYear(), state.currentMonth.getMonth() - 1, 1);
      renderCalendar();
    }

    function nextMonth() {
      state.currentMonth = new Date(state.currentMonth.getFullYear(), state.currentMonth.getMonth() + 1, 1);
      renderCalendar();
    }

    function showScheduleModal() {
      scheduleModalTitle.textContent = '添加日程';
      scheduleTitleInput.value = '';
      scheduleDateInput.value = state.currentScheduleDate;
      scheduleTimeInput.value = '';
      scheduleLocationInput.value = '';
      scheduleNotesInput.value = '';
      scheduleModal.classList.add('show');
      scheduleTitleInput.focus();
    }

    function hideScheduleModal() {
      scheduleModal.classList.remove('show');
    }

    function addSchedule() {
      const title = scheduleTitleInput.value.trim();
      const date = scheduleDateInput.value;
      const time = scheduleTimeInput.value;
      const location = scheduleLocationInput.value.trim();
      const notes = scheduleNotesInput.value.trim();

      if (!title || !date) return;

      state.schedules.push({
        id: generateId(),
        title,
        date,
        time,
        location,
        notes
      });

      saveSchedules();
      hideScheduleModal();
      renderCalendar();
    }

    function deleteSchedule(id) {
      state.schedules = state.schedules.filter(s => s.id !== id);
      saveSchedules();
      renderCalendar();
    }

    // ===== Confirm Dialog =====
    let confirmCallback = null;

    function showConfirm(title, message, callback) {
      confirmTitle.textContent = title;
      confirmMessage.textContent = message;
      confirmCallback = callback;
      dialogOverlay.classList.add('show');
      confirmDialog.classList.add('show');
    }

    function hideConfirm() {
      dialogOverlay.classList.remove('show');
      confirmDialog.classList.remove('show');
      confirmCallback = null;
    }

    // ===== Eye Break Reminder =====
    function startEyeBreakTimer() {
      if (!state.eyeBreakEnabled) return;
      if (state.eyeBreakTimer) return;

      state.eyeBreakTimer = setTimeout(() => {
        showEyeBreak();
        startEyeBreakTimer();
      }, state.eyeBreakInterval);
    }

    function stopEyeBreakTimer() {
      if (state.eyeBreakTimer) {
        clearTimeout(state.eyeBreakTimer);
        state.eyeBreakTimer = null;
      }
    }

    function showEyeBreak() {
      eyeBreakEl.classList.add('show');
      let countdown = 3;

      eyeCountdown.textContent = `${countdown}s`;

      const countdownInterval = setInterval(() => {
        countdown--;
        eyeCountdown.textContent = `${countdown}s`;
        if (countdown <= 0) {
          clearInterval(countdownInterval);
        }
      }, 1000);

      setTimeout(() => {
        hideEyeBreak();
      }, 3000);
    }

    function hideEyeBreak() {
      eyeBreakEl.classList.remove('show');
    }

    // ===== Event Listeners =====
    modeTabs.forEach(tab => {
      tab.addEventListener('click', () => setMode(tab.dataset.mode));
    });

    navItems.forEach(item => {
      item.addEventListener('click', () => setPage(item.dataset.page));
    });

    addBtn.addEventListener('click', showAddForm);
    cancelBtn.addEventListener('click', hideAddForm);
    confirmBtn.addEventListener('click', addTask);
    clearAllBtn.addEventListener('click', clearAllTasks);

    taskNameInput.addEventListener('input', validateForm);
    startTimeInput.addEventListener('change', validateForm);
    endTimeInput.addEventListener('change', validateForm);

    taskNameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !confirmBtn.disabled) {
        addTask();
      }
    });

    // Must modal events
    mustModalCancel.addEventListener('click', hideMustModal);
    mustModalConfirm.addEventListener('click', addMustTask);
    mustNameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        addMustTask();
      }
    });
    mustModal.addEventListener('click', (e) => {
      if (e.target === mustModal) hideMustModal();
    });

    // Schedule events
    prevMonthBtn.addEventListener('click', prevMonth);
    nextMonthBtn.addEventListener('click', nextMonth);
    addScheduleBtn.addEventListener('click', showScheduleModal);
    scheduleModalCancel.addEventListener('click', hideScheduleModal);
    scheduleModalConfirm.addEventListener('click', addSchedule);
    scheduleModal.addEventListener('click', (e) => {
      if (e.target === scheduleModal) hideScheduleModal();
    });

    eyeClose.addEventListener('click', hideEyeBreak);

    // Dialog events
    confirmCancel.addEventListener('click', hideConfirm);
    confirmOk.addEventListener('click', () => {
      if (confirmCallback) confirmCallback();
      hideConfirm();
    });
    dialogOverlay.addEventListener('click', hideConfirm);

    // Click outside to close form
    document.addEventListener('click', (e) => {
      if (addForm.classList.contains('active') &&
          !addForm.contains(e.target) &&
          !addBtn.contains(e.target)) {
        hideAddForm();
      }
    });

    // Page visibility API - keep timers running in background
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        if (state.currentPage === 'home' && state.mode === 'duration') {
          startEyeBreakTimer();
        }
      }
    });

    // ===== Init =====
    function init() {
      loadAllData();
      updateDateDisplay();
      setMode(state.mode);
      renderTasks();
      renderMustTasks();
      updateEyeBreakToggle();

      if (state.currentPage === 'home' && state.mode === 'duration') {
        startEyeBreakTimer();
      }
    }

    init();
  </script>
</body>
</html>
